<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objednávka dinosaura</title>
</head>
<body>
    <h2>Sestav si svého dinosaura</h2>
    <form action="">
        <label for="jmeno">Jméno vašeho dinosaura</label>
        <input type="text" id="jmeno" required>
        <br><br>

        <input type="text" placeholder="Vaše adresa">
        <input type="number" placeholder="Číslo popisné">
        <h3>Specifikace vaše dinosarua</h3>
        <label for="zradlo">Masožravec</label>
        <input type="radio" name="zradlo">
        <label for="zradlo">Býložravec</label>
        <input type="radio" name="zradlo">
        <h3>Barva očí</h3>
        <select name="" id="">
            <option value="">Žlutá</option>
            <option value="">Zelená</option>
            <option value="">Červená</option>
            <option value="">Fialová</option>
        </select>
        <br><br>

        <label for="drapy">Chcete drápy?</label>
        <input type="checkbox" id="drapy">
        <br><br>

        <textarea name="" id="" placeholder="Sem přidejte svůj komentář" rows="10" cols="100"></textarea>
        <h3>Doplňující informace</h3>
        <label for="vylíhnutí">Předpokládané vylíhnutí dinosarua</label>
        <input type="date" id="vylíhnutí">
        <br><br>

        <label for="email">Zadejte Email:</label>
        <input type="email" id="email">
        <br><br>

        <label for="heslo">Zadejte tajné heslo</label>
        <input type="password" id="heslo">
        <br><br>

        <input type="reset" value="Odeslat">
        <input type="submit">
    </form>
</body>
</html>
